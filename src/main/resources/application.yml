server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # 连接超时配置（毫秒）
  connection-timeout: 300000
  # Tomcat配置
  tomcat:
    connection-timeout: 300000
    max-connections: 10000
    threads:
      max: 200
      min-spare: 10

spring:
  application:
    name: dict-manager
  profiles:
    active: dev
  
  # 禁用观察功能，避免 Micrometer 相关错误（Spring Boot 3.1.1 版本问题）
  observation:
    http:
      enabled: false
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
      file-size-threshold: 10MB
  
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/

# 禁用 Actuator 和监控功能（如果不需要）
management:
  endpoints:
    enabled-by-default: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.sunline.dict.entity

# Excel导入配置
excel:
  import:
    password: "201314"  # Excel导入口令（6位数字）

# Git配置
git:
  gitlab:
    url: http://gitlab.spdb.com  # GitLab地址

# Webhook 调 GitLab API 用的 token（必须用 access-token 这个 key，不能用 accessToken）
# 不配置则 Webhook 会尝试用 database.export.token，建议与下方 database.export.token 保持一致
gitlab:
  access-token: WScw9XyM8hM1sYKLAz8o  # 与 database.export.token 一致，用于 Webhook 下载文件
  download-mode: api   # api=仅 API；clone=仅 git clone（API 一直 404 时可改为 clone）
  # UAT 分支提交校验：要求 commit 先在 sit 分支存在
  validate-uat-from-sit: true  # 是否启用 uat 分支校验（默认 false）
  bypass-keywords: 用于贯标优先,紧急修复优先  # 白名单关键字（逗号分隔），commit message 包含任一关键字时跳过校验

# 数据库导出配置
database:
  export:
    environments:
      dev:
        url: "jdbc:opengauss://localhost:5432/database_dev"
        username: "gaussdb_user"
        password: "password123"
      sit:
        url: "jdbc:opengauss://localhost:5432/database_sit"
        username: "gaussdb_user"
        password: "password123"
      uat:
        url: "jdbc:opengauss://localhost:5432/database_uat"
        username: "gaussdb_user"
        password: "password123"
      base:
        url: "jdbc:opengauss://localhost:5432/database_base"
        username: "gaussdb_user"
        password: "password123"
    username: c-wangsh8  # GitLab用户名（如果使用token认证，此字段可选）
    password: Liang*201314  # GitLab密码（如果使用token认证，此字段可选）
    # GitLab Personal Access Token（推荐使用，优先级高于用户名密码）
    # 获取方式：登录GitLab -> 用户设置 -> Access Tokens -> 创建Token
    # 需要勾选权限：api, read_api, read_repository
    token: WScw9XyM8hM1sYKLAz8o  # 请在此处填写您的GitLab Personal Access Token
  projects:
    # Git工程列表配置，格式：GitLab项目ID，用逗号分隔
    # 例如：64145,64142,63227,63467,63474
    # GitLab项目ID可以在项目设置中查看，或者从项目URL中获取
    # 如果不配置，系统会自动从GitLab API获取用户的所有项目
    list: 63286,63223,64145,64142,63227,63467,63474,63469,63479,63468,63475,63470,63480,63587,63588

# 代码同步配置（Webhook 触发 master 分支代码同步到本地服务器）
code-sync:
  base-path: /home/cbs/code                  # 代码存放根目录，每个工程放在 {base-path}/{project_name}/
  allowed-project-ids: 64142,63227,63467,63474,63469,63479,63468,63475,63470,63480,63587,63588
  git-timeout-seconds: 300                   # git 命令超时时间（秒）

# 工程编译配置
# 批次之间串行执行（前一批全部成功才开始下一批）
# 批次内部并行执行（同一批中的工程同时编译）
build:
  base-path: /home/cbs/code
  log-path: /home/cbs/logs/build
  mvn-home:                                  # Maven 路径（留空则使用 PATH 中的 mvn）
  settings-file: /home/cbs/code/settings.xml # Maven settings.xml 路径（留空则使用默认）
  build-timeout-minutes: 30                  # 单个工程编译超时（分钟）
  batches:
    - name: "第一批-基础字典"
      parallel: false
      projects:
        - ccbs-dict
    - name: "第二批-AP框架"
      parallel: false
      projects:
        - ccbs-ap
    - name: "第三批-API层"
      parallel: true
      projects:
        - ccbs-comm-api
        - ccbs-sett-api
        - ccbs-dept-api
        - ccbs-loan-api
    - name: "第四批-实现层"
      parallel: true
      projects:
        - ccbs-comm-impl
        - ccbs-sett-impl
        - ccbs-dept-impl
        - ccbs-loan-impl

# 向量化配置（embedding-service + Qdrant）
vectorization:
  enabled: true                           # 向量化已启用
  embedding-url: http://21.73.16.151:8765  # embedding-service 地址
  qdrant-host: 21.73.16.151               # Qdrant 地址
  qdrant-port: 6333                       # Qdrant REST 端口
  collection: xml_models                  # collection 名称
  vector-size: 768                        # BGE-base-zh 向量维度

# 日志配置
logging:
  level:
    com.sunline.dict: debug
    com.baomidou.mybatisplus: debug
    # 降低HTTP解析错误的日志级别（避免HTTPS访问HTTP端口的错误日志）
    org.apache.coyote.http11.Http11Processor: ERROR
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

