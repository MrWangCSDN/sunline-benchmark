<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git权限管理 - 字典管理系统</title>
    <script src="/js/vue.global.js"></script>
    <script src="/js/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input[type="text"]:focus,
        .form-group select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group .help-text {
            margin-top: 5px;
            font-size: 12px;
            color: #6b7280;
        }

        .projects-container {
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .project-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .project-item:hover {
            background: #f3f4f6;
            border-color: #667eea;
        }

        .project-item input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .project-item label {
            flex: 1;
            cursor: pointer;
            margin: 0;
            font-weight: normal;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .select-all-btn {
            margin-bottom: 15px;
        }

        .select-all-btn button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .select-all-btn button:hover {
            background: #5568d3;
        }

        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .result-item {
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border-radius: 6px;
            border-left: 4px solid #10b981;
        }

        .result-item.error {
            border-left-color: #ef4444;
        }

        .result-item .project-name {
            font-weight: 600;
            color: #374151;
            margin-bottom: 5px;
        }

        .result-item .message {
            color: #6b7280;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>👥 Git权限管理</h1>
            <p class="subtitle">批量管理Git用户的项目权限</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Git用户（多个用户用逗号分隔）</label>
                <input 
                    type="text" 
                    v-model="users" 
                    placeholder="例如: user1,user2,user3"
                    @input="validateUsers"
                />
                <div class="help-text">请输入Git用户名，多个用户用逗号分隔</div>
            </div>

            <div class="form-group">
                <label>权限级别</label>
                <select v-model="accessLevel">
                    <option value="10">Guest（访客）</option>
                    <option value="20">Reporter（报告者）</option>
                    <option value="30">Developer（开发者）</option>
                    <option value="40">Maintainer（维护者）</option>
                </select>
                <div class="help-text">选择要授予的权限级别</div>
            </div>

            <div class="form-group">
                <label>Git项目</label>
                <div class="select-all-btn">
                    <button @click="toggleSelectAll">全选/取消全选</button>
                </div>
                <div class="projects-container" v-if="projects.length > 0">
                    <div class="project-item" v-for="project in projects" :key="project.id">
                        <input 
                            type="checkbox" 
                            :id="'project-' + project.id"
                            :value="project.id"
                            v-model="selectedProjects"
                        />
                        <label :for="'project-' + project.id">
                            {{ project.name }} ({{ project.path }})
                        </label>
                    </div>
                </div>
                <div v-else class="loading">正在加载项目列表</div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" @click="inviteUsers" :disabled="processing || !canSubmit">
                    邀请
                </button>
                <button class="btn btn-danger" @click="revokeUsers" :disabled="processing || !canSubmit">
                    收回
                </button>
                <button class="btn btn-secondary" @click="cancel" :disabled="processing">
                    取消
                </button>
            </div>

            <div class="result-container" v-if="results.length > 0">
                <h3 style="margin-bottom: 15px; color: #374151;">操作结果</h3>
                <div 
                    class="result-item" 
                    :class="{ error: !result.success }"
                    v-for="(result, index) in results" 
                    :key="index"
                >
                    <div class="project-name">{{ result.project }}</div>
                    <div class="message">{{ result.message }}</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    users: '',
                    accessLevel: '30', // 默认Developer
                    projects: [],
                    selectedProjects: [],
                    results: [],
                    processing: false
                };
            },
            computed: {
                canSubmit() {
                    return this.users.trim() !== '' && 
                           this.selectedProjects.length > 0 &&
                           !this.processing;
                }
            },
            mounted() {
                this.loadProjects();
            },
            methods: {
                async loadProjects() {
                    try {
                        const response = await axios.get('/api/git/projects');
                        if (response.data.code === 200) {
                            this.projects = response.data.data;
                        } else {
                            alert('加载项目列表失败: ' + response.data.message);
                        }
                    } catch (error) {
                        console.error('加载项目列表失败:', error);
                        alert('加载项目列表失败: ' + (error.response?.data?.message || error.message));
                    }
                },
                validateUsers() {
                    // 可以在这里添加用户名的验证逻辑
                },
                toggleSelectAll() {
                    if (this.selectedProjects.length === this.projects.length) {
                        this.selectedProjects = [];
                    } else {
                        this.selectedProjects = this.projects.map(p => p.id);
                    }
                },
                async inviteUsers() {
                    if (!this.canSubmit) {
                        return;
                    }

                    const userList = this.users.split(',').map(u => u.trim()).filter(u => u);
                    if (userList.length === 0) {
                        alert('请输入至少一个Git用户名');
                        return;
                    }

                    this.processing = true;
                    this.results = [];

                    try {
                        const response = await axios.post('/api/git/permissions/invite', {
                            users: userList,
                            accessLevel: parseInt(this.accessLevel),
                            projectIds: this.selectedProjects
                        });

                        if (response.data.code === 200) {
                            this.results = response.data.data;
                            alert('权限邀请操作完成！');
                        } else {
                            alert('操作失败: ' + response.data.message);
                        }
                    } catch (error) {
                        console.error('邀请用户失败:', error);
                        alert('邀请用户失败: ' + (error.response?.data?.message || error.message));
                    } finally {
                        this.processing = false;
                    }
                },
                async revokeUsers() {
                    if (!this.canSubmit) {
                        return;
                    }

                    const userList = this.users.split(',').map(u => u.trim()).filter(u => u);
                    if (userList.length === 0) {
                        alert('请输入至少一个Git用户名');
                        return;
                    }

                    if (!confirm('确定要收回这些用户在所有选中项目中的权限吗？')) {
                        return;
                    }

                    this.processing = true;
                    this.results = [];

                    try {
                        const response = await axios.post('/api/git/permissions/revoke', {
                            users: userList,
                            projectIds: this.selectedProjects
                        });

                        if (response.data.code === 200) {
                            this.results = response.data.data;
                            alert('权限收回操作完成！');
                        } else {
                            alert('操作失败: ' + response.data.message);
                        }
                    } catch (error) {
                        console.error('收回权限失败:', error);
                        alert('收回权限失败: ' + (error.response?.data?.message || error.message));
                    } finally {
                        this.processing = false;
                    }
                },
                cancel() {
                    this.users = '';
                    this.selectedProjects = [];
                    this.results = [];
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
