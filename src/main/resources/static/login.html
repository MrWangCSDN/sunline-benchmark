<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 字典管理系统</title>
    <script src="/js/vue.global.js"></script>
    <script src="/js/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 50px 60px;
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .login-header h1 {
            font-size: 32px;
            color: #1a202c;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #718096;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #f7fafc;
            color: #2d3748;
        }

        .form-group input:hover {
            border-color: #cbd5e0;
            background: #edf2f7;
        }

        .form-group input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover:not(:disabled)::before {
            width: 300px;
            height: 300px;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            padding: 12px;
            background: #fed7d7;
            border-radius: 8px;
            border: 1px solid #fc8181;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .footer-info {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
            color: #718096;
            font-size: 13px;
        }

        .footer-info a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-info a:hover {
            color: #764ba2;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .login-container {
                padding: 40px 30px;
                max-width: 100%;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .login-header .logo {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="logo">📊</div>
                <h1>字典管理系统</h1>
                <p>请登录您的账户以继续</p>
            </div>
            
            <form @submit.prevent="login">
                <div class="form-group">
                    <label>用户名</label>
                    <input 
                        type="text" 
                        v-model="username" 
                        placeholder="请输入用户名"
                        required
                        autofocus
                    />
                </div>
                
                <div class="form-group">
                    <label>密码</label>
                    <input 
                        type="password" 
                        v-model="password" 
                        placeholder="请输入密码"
                        required
                        @keyup.enter="login"
                    />
                </div>
                
                <button type="submit" class="btn-login" :disabled="loading">
                    <span v-if="!loading">登录</span>
                    <span v-else>登录中...</span>
                </button>
                
                <div v-if="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
            </form>

            <div class="footer-info">
                <p>© 2024 字典管理系统 | 版权所有</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    loading: false,
                    errorMessage: ''
                };
            },
            methods: {
                async login() {
                    this.errorMessage = '';
                    
                    if (!this.username.trim()) {
                        this.errorMessage = '请输入用户名';
                        return;
                    }
                    
                    if (!this.password.trim()) {
                        this.errorMessage = '请输入密码';
                        return;
                    }
                    
                    this.loading = true;
                    
                    try {
                        const response = await axios.post('/api/auth/login', {
                            username: this.username.trim(),
                            password: this.password
                        });
                        
                        if (response.data.code === 200) {
                            // 登录成功，跳转到首页
                            window.location.href = '/';
                        } else {
                            this.errorMessage = response.data.message || '登录失败，请检查用户名和密码';
                        }
                    } catch (error) {
                        this.errorMessage = error.response?.data?.message || '登录失败，请检查网络连接';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }).mount('.login-wrapper');
    </script>
</body>
</html>
